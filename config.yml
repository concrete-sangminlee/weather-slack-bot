# Seoul Weather Slack Bot Configuration
# Customize your weather bot by editing this file.

# Primary city
city:
  name: 서울
  latitude: 37.5665
  longitude: 126.9780

# Compare with other cities (optional, max 3)
compare_cities:
  # - name: 부산
  #   latitude: 35.1796
  #   longitude: 129.0756
  # - name: 제주
  #   latitude: 33.4996
  #   longitude: 126.5312

# Language (ko, en, ja)
locale: ko

# Schedule timezone (IANA format)
timezone: Asia/Seoul

# Forecast settings
forecast:
  hourly_hours: 6
  daily_days: 3
  past_days: 1
  trend_days: 7

# Display toggles
display:
  show_air_quality: true
  show_hourly: true
  show_daily_forecast: true
  show_yesterday_comparison: true
  show_best_time: true
  show_weekly_trend: true
  show_city_comparison: true
  show_golden_hour: true

# Alert thresholds (for alert.py extreme weather checks)
alerts:
  temp_high: 35         # °C — heatwave
  temp_low: -15         # °C — cold wave
  wind_speed: 14        # m/s — strong wind
  wind_gust: 25         # m/s — dangerous gusts
  precip_heavy: 30      # mm — heavy rain
  precip_moderate: 10   # mm — moderate rain
  aqi_danger: 200       # AQI — very unhealthy
  aqi_warn: 150         # AQI — unhealthy

# Multiple Slack channels (optional)
# If set, sends to all channels. Overrides SLACK_CHANNEL env var.
# slack_channels:
#   - general
#   - weather
#   - team-alerts
