# Seoul Weather Slack Bot Configuration
# Customize your weather bot by editing this file.

# Primary city
city:
  name: 서울
  latitude: 37.5665
  longitude: 126.9780

# Compare with other cities (optional, max 3)
# Adds a compact comparison row for each city
compare_cities:
  # - name: 부산
  #   latitude: 35.1796
  #   longitude: 129.0756
  # - name: 제주
  #   latitude: 33.4996
  #   longitude: 126.5312
  # - name: Tokyo
  #   latitude: 35.6762
  #   longitude: 139.6503

# Language (ko, en, ja)
locale: ko

# Schedule timezone (IANA format)
timezone: Asia/Seoul

# Forecast settings
forecast:
  hourly_hours: 6       # Number of hours to show in hourly forecast
  daily_days: 3         # Number of days in daily forecast (max 7)
  past_days: 1          # Days of history for comparison (0 to disable)
  trend_days: 7         # Days for weekly temperature trend chart

# Display settings
display:
  show_air_quality: true
  show_hourly: true
  show_daily_forecast: true
  show_yesterday_comparison: true
  show_best_time: true
  show_weekly_trend: true
  show_city_comparison: true
