name: Seoul Weather Bot

on:
  schedule:
    # 매일 아침 7시 KST (= UTC 22:00 전날)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug - Check API key length
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: echo "API key length:" ${#OPENWEATHERMAP_API_KEY}

      - name: Debug - Test API with curl
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: curl -s "https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${OPENWEATHERMAP_API_KEY}&units=metric" | python -m json.tool

      - name: Send weather to Slack
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python weather_bot.py
