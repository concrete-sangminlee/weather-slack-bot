name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set config to...
        2. Run...
        3. See error...
  - type: input
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: textarea
    attributes:
      label: Error logs
      render: shell
